<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620">
  <rect width="100%" height="100%" fill="#f0fdf4"/>
  <rect x="0" y="0" width="900" height="620" fill="#f0fdf4"/>
  <rect x="0" y="0" width="900" height="68" fill="#064e3b"/>
  <text x="450" y="26" font-size="18" fill="#ffffff">dev-squad  Layered Memory Architecture</text>
  <text x="450" y="50" font-size="11" fill="#6ee7b7">5 layers   hook-enforced   deterministic   L0 wins on conflict</text>
  <rect x="18" y="85" width="238" height="72" rx="6" fill="#064e3b"/>
  <text x="28" y="106" font-size="12" fill="#ffffff">L0   System of Record</text>
  <text x="28" y="122" font-size="9" fill="#6ee7b7">.dev-squad/record.md</text>
  <text x="28" y="138" font-size="9" fill="#fde68a">AUTHORITATIVE  wins on any conflict</text>
  <text x="28" y="150" font-size="8" fill="#a7f3d0">append-only   versioned   structured</text>
  <rect x="18" y="165" width="238" height="72" rx="6" fill="#065f46"/>
  <text x="28" y="186" font-size="12" fill="#ffffff">L1   Episodic Memory</text>
  <text x="28" y="202" font-size="9" fill="#6ee7b7">episodic-memory plugin</text>
  <text x="28" y="218" font-size="9" fill="#a7f3d0">session logs   cross-project history</text>
  <text x="28" y="230" font-size="8" fill="#d1fae5">mandatory recall before debugging</text>
  <rect x="18" y="245" width="238" height="72" rx="6" fill="#047857"/>
  <text x="28" y="266" font-size="12" fill="#ffffff">L2   Semantic / Instincts</text>
  <text x="28" y="282" font-size="9" fill="#6ee7b7">.dev-squad/instincts/*.md</text>
  <text x="28" y="298" font-size="9" fill="#a7f3d0">confidence-scored learned patterns</text>
  <text x="28" y="310" font-size="8" fill="#d1fae5">auto-distilled by observe-learning.sh</text>
  <rect x="18" y="325" width="238" height="72" rx="6" fill="#059669"/>
  <text x="28" y="346" font-size="12" fill="#ffffff">L3   Working Memory</text>
  <text x="28" y="362" font-size="9" fill="#d1fae5">.dev-squad/memory.md</text>
  <text x="28" y="378" font-size="9" fill="#d1fae5">curated decisions  conventions</text>
  <text x="28" y="390" font-size="8" fill="#d1fae5">agents append via Edit tool</text>
  <rect x="18" y="405" width="238" height="72" rx="6" fill="#10b981"/>
  <text x="28" y="426" font-size="12" fill="#064e3b">L4   Traps</text>
  <text x="28" y="442" font-size="9" fill="#064e3b">.dev-squad/gotchas.md</text>
  <text x="28" y="458" font-size="9" fill="#064e3b">mistakes not to repeat</text>
  <text x="28" y="470" font-size="8" fill="#065f46">lowest priority  human-curated</text>
  <rect x="320" y="85" width="190" height="392" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="415" y="160" font-size="16" fill="#93c5fd">AGENTS</text>
  <text x="415" y="185" font-size="9" fill="#dbeafe">coordinator</text>
  <text x="415" y="200" font-size="9" fill="#dbeafe">architect</text>
  <text x="415" y="215" font-size="9" fill="#dbeafe">designer</text>
  <text x="415" y="230" font-size="9" fill="#dbeafe">backend</text>
  <text x="415" y="245" font-size="9" fill="#dbeafe">frontend</text>
  <text x="415" y="260" font-size="9" fill="#dbeafe">reviewer</text>
  <text x="415" y="275" font-size="9" fill="#dbeafe">qa-engineer</text>
  <text x="415" y="290" font-size="9" fill="#dbeafe">auditor</text>
  <text x="415" y="305" font-size="9" fill="#dbeafe">devops</text>
  <text x="415" y="320" font-size="9" fill="#dbeafe">git-ops</text>
  <text x="415" y="335" font-size="9" fill="#dbeafe">writer</text>
  <rect x="572" y="85" width="310" height="72" rx="6" fill="#064e3b"/>
  <text x="582" y="106" font-size="10" fill="#6ee7b7">Phase 0 / /dev-squad init</text>
  <text x="582" y="122" font-size="9" fill="#a7f3d0">coordinator writes locked decisions</text>
  <text x="582" y="138" font-size="9" fill="#fde68a">tech stack  SaaS mode  ADR log</text>
  <text x="582" y="150" font-size="8" fill="#d1fae5">never edit rows  only append</text>
  <rect x="572" y="165" width="310" height="72" rx="6" fill="#065f46"/>
  <text x="582" y="186" font-size="10" fill="#6ee7b7">episodic-memory plugin (auto)</text>
  <text x="582" y="202" font-size="9" fill="#a7f3d0">session-end sync  no agent action needed</text>
  <text x="582" y="218" font-size="9" fill="#d1fae5">recall directive injected via hook</text>
  <text x="582" y="230" font-size="8" fill="#d1fae5">mandatory before debugging / review</text>
  <rect x="572" y="245" width="310" height="72" rx="6" fill="#047857"/>
  <text x="582" y="266" font-size="10" fill="#6ee7b7">observe-learning.sh (PostToolUse hook)</text>
  <text x="582" y="282" font-size="9" fill="#a7f3d0">captures observations automatically</text>
  <text x="582" y="298" font-size="9" fill="#d1fae5">/dev-squad evolve distils to instincts</text>
  <text x="582" y="310" font-size="8" fill="#fde68a">graduates at confidence &gt;= 0.8</text>
  <rect x="572" y="325" width="310" height="72" rx="6" fill="#059669"/>
  <text x="582" y="346" font-size="10" fill="#ffffff">agents Edit .dev-squad/memory.md</text>
  <text x="582" y="362" font-size="9" fill="#d1fae5">coordinator curates every few phases</text>
  <text x="582" y="378" font-size="9" fill="#d1fae5">SubagentStop nudge: CAPTURE REQUIRED</text>
  <text x="582" y="390" font-size="8" fill="#d1fae5">head-limited to 80 lines on inject</text>
  <rect x="572" y="405" width="310" height="72" rx="6" fill="#10b981"/>
  <text x="582" y="426" font-size="10" fill="#064e3b">check-workflow.sh (SubagentStop hook)</text>
  <text x="582" y="442" font-size="9" fill="#064e3b">nudges agent to write gotchas.md</text>
  <text x="582" y="458" font-size="9" fill="#064e3b">non-blocking reminder after self-heal</text>
  <text x="582" y="470" font-size="8" fill="#065f46">human curator cleans periodically</text>
  <line x1="256" y1="121" x2="318" y2="121" stroke="#2563eb" stroke-width="2"/>
  <polygon points="318,116 326,121 318,126" fill="#2563eb"/>
  <line x1="256" y1="201" x2="318" y2="201" stroke="#2563eb" stroke-width="2"/>
  <polygon points="318,196 326,201 318,206" fill="#2563eb"/>
  <line x1="256" y1="281" x2="318" y2="281" stroke="#2563eb" stroke-width="2"/>
  <polygon points="318,276 326,281 318,286" fill="#2563eb"/>
  <line x1="256" y1="361" x2="318" y2="361" stroke="#2563eb" stroke-width="2"/>
  <polygon points="318,356 326,361 318,366" fill="#2563eb"/>
  <line x1="256" y1="441" x2="318" y2="441" stroke="#2563eb" stroke-width="2"/>
  <polygon points="318,436 326,441 318,446" fill="#2563eb"/>
  <line x1="512" y1="121" x2="570" y2="121" stroke="#d97706" stroke-width="2"/>
  <polygon points="570,116 578,121 570,126" fill="#d97706"/>
  <line x1="512" y1="201" x2="570" y2="201" stroke="#d97706" stroke-width="2"/>
  <polygon points="570,196 578,201 570,206" fill="#d97706"/>
  <line x1="512" y1="281" x2="570" y2="281" stroke="#d97706" stroke-width="2"/>
  <polygon points="570,276 578,281 570,286" fill="#d97706"/>
  <line x1="512" y1="361" x2="570" y2="361" stroke="#d97706" stroke-width="2"/>
  <polygon points="570,356 578,361 570,366" fill="#d97706"/>
  <line x1="512" y1="441" x2="570" y2="441" stroke="#d97706" stroke-width="2"/>
  <polygon points="570,436 578,441 570,446" fill="#d97706"/>
  <text x="272" y="113" font-size="8" fill="#60a5fa">inject</text>
  <text x="272" y="193" font-size="8" fill="#60a5fa">inject</text>
  <text x="272" y="273" font-size="8" fill="#60a5fa">inject</text>
  <text x="272" y="353" font-size="8" fill="#60a5fa">inject</text>
  <text x="272" y="433" font-size="8" fill="#60a5fa">inject</text>
  <text x="526" y="113" font-size="8" fill="#fbbf24">write</text>
  <text x="526" y="193" font-size="8" fill="#fbbf24">write</text>
  <text x="526" y="273" font-size="8" fill="#fbbf24">write</text>
  <text x="526" y="353" font-size="8" fill="#fbbf24">write</text>
  <text x="526" y="433" font-size="8" fill="#fbbf24">write</text>
  <rect x="0" y="500" width="900" height="120" fill="#0f172a"/>
  <line x1="0" y1="500" x2="900" y2="500" stroke="#1d4ed8" stroke-width="2"/>
  <text x="18" y="520" font-size="11" fill="#60a5fa">SubagentStart   inject-workflow-state.sh</text>
  <text x="18" y="538" font-size="9" fill="#94a3b8">Fires on every agent start. No prose dependency.</text>
  <text x="18" y="554" font-size="9" fill="#94a3b8">Injection order (priority high to low):</text>
  <text x="18" y="570" font-size="9" fill="#cbd5e1">L0 record.md  &gt;  workflow state  &gt;  L3 memory  &gt;  L4 gotchas  &gt;  L2 instincts  &gt;  L1 recall directive</text>
  <text x="18" y="586" font-size="8" fill="#475569">L0 read first = authoritative context arrives before anything can override it</text>
  <line x1="460" y1="508" x2="460" y2="610" stroke="#1e293b" stroke-width="1"/>
  <text x="478" y="520" font-size="11" fill="#f59e0b">SubagentStop   check-workflow.sh + observe-learning.sh</text>
  <text x="478" y="538" font-size="9" fill="#94a3b8">check-workflow.sh: nudges capture after self-heal events</text>
  <text x="478" y="554" font-size="9" fill="#94a3b8">observe-learning.sh: PostToolUse hook feeds L2 instincts</text>
  <text x="478" y="570" font-size="9" fill="#cbd5e1">/dev-squad evolve: promotes stable instincts to semantic layer</text>
  <text x="478" y="586" font-size="8" fill="#475569">stop-verify.sh: 300s final gate before agent stops</text>
  <rect x="4" y="85" width="6" height="392" rx="2" fill="#fbbf24"/>
  <polygon points="7,81 2,89 12,89" fill="#fbbf24"/>
  <polygon points="7,481 2,473 12,473" fill="#fbbf24"/>
  <text x="14" y="91" font-size="7" fill="#fbbf24">HIGH</text>
  <text x="14" y="477" font-size="7" fill="#fbbf24">LOW</text>
  <text x="340" y="490" font-size="8" fill="#60a5fa">inject (SubagentStart)</text>
  <text x="530" y="490" font-size="8" fill="#fbbf24">write (hooks / agents)</text>
</svg>
